name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: arabic-med-reminder-online-build-v2

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Complete Android project files
        run: flutter create --platforms=android --org com.example .

      - name: Get packages
        run: flutter pub get

      - name: Build installable APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: arabic-med-reminder-apk
          path: arabic-med-reminder-online-build-v2/build/app/outputs/flutter-apk/app-debug.apk
